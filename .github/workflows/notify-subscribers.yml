name: Notify Subscribers

on:
  workflow_dispatch:
    inputs:
      subject:
        description: Email subject
        required: false
        default: ""
      body:
        description: Email body (plain text)
        required: false
        default: ""

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      issues: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install nodemailer

      - name: Send email to subscribers
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          EMAIL_SUBJECT: ${{ inputs.subject }}
          EMAIL_BODY: ${{ inputs.body }}
        run: |
          node <<'NODE'
          const nodemailer = require('nodemailer');
          const fs = require('fs');

          function readTemplate(filePath) {
            if (!fs.existsSync(filePath)) return { subject: '', body: '' };
            const raw = fs.readFileSync(filePath, 'utf8');
            const parts = raw.split(/\r?\n\r?\n/);
            const firstLine = (parts[0] || '').trim();
            const subjectMatch = /^Subject:\s*(.*)$/i.exec(firstLine);
            const subject = subjectMatch ? subjectMatch[1].trim() : '';
            const body = parts.slice(1).join('\n\n').trim();
            return { subject, body };
          }

          function escapeHtml(text) {
            return (text || '').replace(/[&<>\"]/g, (ch) => {
              switch (ch) {
                case '&': return '&amp;';
                case '<': return '&lt;';
                case '>': return '&gt;';
                case '"': return '&quot;';
                default: return ch;
              }
            });
          }

          function toHtml(text) {
            const escaped = escapeHtml(text);
            const withLinks = escaped.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" style="color:#c8a84e;text-decoration:underline;">$1</a>');
            const bodyContent = withLinks.replace(/\r?\n/g, '<br>');
            return `<!DOCTYPE html>
          <html lang="en">
          <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
          <title>Chronicle Update</title></head>
          <body style="margin:0;padding:0;background-color:#0f0d0a;font-family:Georgia,'Times New Roman',serif;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f0d0a;">
          <tr><td align="center" style="padding:32px 16px;">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background-color:#1e1a14;border:1px solid #3d3428;">
          <!-- Header -->
          <tr><td style="padding:32px 24px 20px;text-align:center;border-bottom:1px solid #3d3428;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0"><tr>
          <td style="text-align:center;">
          <div style="margin-bottom:12px;">
          <span style="display:inline-block;width:60px;height:1px;background:#a08050;vertical-align:middle;"></span>
          <span style="display:inline-block;width:8px;height:8px;background:#a08050;transform:rotate(45deg);margin:0 12px;vertical-align:middle;"></span>
          <span style="display:inline-block;width:60px;height:1px;background:#a08050;vertical-align:middle;"></span>
          </div>
          <h1 style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:24px;font-weight:700;color:#c8a84e;letter-spacing:0.15em;text-transform:uppercase;">CHRONICLE</h1>
          <p style="margin:6px 0 0;font-family:Georgia,'Times New Roman',serif;font-size:13px;color:#7a6e5e;font-style:italic;letter-spacing:0.05em;">New Update Available</p>
          </td></tr></table>
          </td></tr>
          <!-- Body -->
          <tr><td style="padding:28px 32px;">
          <div style="font-family:Georgia,'Times New Roman',serif;font-size:15px;color:#b0a08a;line-height:1.8;">
          ${bodyContent}
          </div>
          </td></tr>
          <!-- CTA Button -->
          <tr><td style="padding:0 32px 28px;text-align:center;">
          <a href="https://miracleyang.com/" style="display:inline-block;padding:12px 32px;background-color:#c8a84e;color:#0f0d0a;font-family:Georgia,'Times New Roman',serif;font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;">Visit Chronicle</a>
          </td></tr>
          <!-- Footer -->
          <tr><td style="padding:20px 24px;border-top:1px solid #3d3428;text-align:center;">
          <p style="margin:0;font-family:'Courier New',monospace;font-size:11px;color:#7a6e5e;letter-spacing:0.05em;">You received this because you subscribed to Chronicle updates.</p>
          <p style="margin:8px 0 0;font-family:'Courier New',monospace;font-size:11px;color:#7a6e5e;">Visit <a href="https://miracleyang.com/" style="color:#c8a84e;text-decoration:underline;">miracleyang.com</a> to unsubscribe.</p>
          </td></tr>
          </table>
          </td></tr></table>
          </body></html>`;
          }

          function parseEmail(title) {
            const match = /^\[subscribe\]\s+(.+)$/.exec(title || '');
            if (!match) return null;
            const email = match[1].trim().toLowerCase();
            const STRICT = /^[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}$/;
            if (!STRICT.test(email)) {
              console.warn(`::warning::Skipping invalid subscriber email from issue title: ${title}`);
              return null;
            }
            return email;
          }

          async function listSubscribers() {
            const repo = process.env.GH_REPO || '';
            const [owner, name] = repo.split('/');
            if (!owner || !name) throw new Error('Invalid GH_REPO');

            const url = `https://api.github.com/repos/${owner}/${name}/issues?state=open&labels=subscribe&per_page=100`;
            const res = await fetch(url, {
              headers: {
                'Accept': 'application/vnd.github+json',
                'Authorization': `Bearer ${process.env.GH_TOKEN}`
              }
            });
            if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
            const data = await res.json();
            const emails = new Set();
            for (const issue of data) {
              const email = parseEmail(issue.title);
              if (email) emails.add(email);
            }
            return Array.from(emails);
          }

          async function main() {
            const template = readTemplate('.github/workflows/notify-template.txt');
            const subject = process.env.EMAIL_SUBJECT || template.subject || 'Chronicle Update';
            const body = process.env.EMAIL_BODY || template.body || '';
            const html = toHtml(body);
            const smtpPort = Number(process.env.SMTP_PORT || 465);

            const emails = await listSubscribers();
            if (emails.length === 0) {
              console.log('No subscribers found.');
              return;
            }

            const transporter = nodemailer.createTransport({
              host: process.env.SMTP_HOST,
              port: smtpPort,
              secure: smtpPort === 465,
              auth: {
                user: process.env.SMTP_USER,
                pass: process.env.SMTP_PASS
              }
            });

            const fromName = 'Chronicle Updates';
            await transporter.sendMail({
              from: `${fromName} <${process.env.SMTP_USER}>`,
              to: process.env.SMTP_USER,
              bcc: emails,
              subject,
              text: body,
              html
            });

            console.log(`Sent to ${emails.length} subscribers.`);
          }

          main().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          NODE

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CI Failure] notify-subscribers run #${context.runNumber}`,
              body: [
                'The notify-subscribers workflow failed.',
                '',
                `Run: ${runUrl}`,
                `Triggered by: @${context.actor}`,
                `Commit: ${context.sha}`
              ].join('\n'),
              labels: ['ci-failure']
            });
