name: Auto-update lastUpdate date

on:
  push:
    branches: [main]
    paths:
      - "database/**"
      - "style/**"
      - "index.html"
    paths-ignore:
      - "README.md"
      - "sitemap.xml"
      - "feed.xml"
      - ".github/workflows/**"

concurrency:
  group: auto-update-date
  cancel-in-progress: true

jobs:
  update-date:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update lastUpdate in profile.json
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          CURRENT=$(grep -oP '"lastUpdate":\s*"\K[^"]+' database/profile.json)
          if [ "$CURRENT" != "$TODAY" ]; then
            sed -i "s/\"lastUpdate\": \"$CURRENT\"/\"lastUpdate\": \"$TODAY\"/" database/profile.json
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add database/profile.json
            if git diff --cached --quiet; then
              echo "No staged changes after sed, skipping commit."
            else
              git commit -m "chore: auto-update lastUpdate to $TODAY [skip ci]"
              git push
            fi
          else
            echo "Date already current ($TODAY), skipping."
          fi
