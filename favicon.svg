<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0f0d0a; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1714; }
    }
  </style>
  <!-- Background -->
  <rect class="bg" width="32" height="32" rx="4" fill="#0f0d0a"/>
  <!-- Outer diamond (subtle) -->
  <polygon points="16,2 30,16 16,30 2,16" fill="none" stroke="#c8a84e" stroke-width="1" stroke-linejoin="round" opacity="0.3"/>
  <!-- Inner diamond (solid) -->
  <polygon points="16,5 27,16 16,27 5,16" fill="none" stroke="#c8a84e" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Stylized C monogram -->
  <path d="M19,12 C18,10.5 16.8,10 15.5,10 C13,10 11,12.5 11,16 C11,19.5 13,22 15.5,22 C16.8,22 18,21.5 19,20"
        fill="none" stroke="#c8a84e" stroke-width="2" stroke-linecap="round"/>
</svg>
