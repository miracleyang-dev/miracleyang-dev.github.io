<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronicle</title>
<meta name="description" content="Miracle Yang's personal chronicle — essays, records, achievements, and the journey of growth.">
<meta name="author" content="Miracle Yang">
<link rel="canonical" href="https://miracleyang.com/">
<meta name="theme-color" content="#0a0a0a">
<meta name="color-scheme" content="dark light">
<meta property="og:title" content="Chronicle — Miracle Yang">
<meta property="og:description" content="Essays, records, achievements, and the journey of growth.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://miracleyang.com">
<meta property="og:locale" content="en_US">
<meta property="og:locale:alternate" content="zh_CN">
<meta property="og:image" content="https://miracleyang.com/favicon.svg">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Chronicle — Miracle Yang">
<meta name="twitter:description" content="Essays, records, achievements, and the journey of growth.">
<meta name="twitter:image" content="https://miracleyang.com/favicon.svg">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.cn">
<link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin>
<link href="https://fonts.googleapis.cn/css2?family=Cinzel:wght@600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style/chronicle.css">
</head>
<body>

<!-- THEME & LANG TOGGLES (top-left) -->
<button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle dark/light theme">
  <span class="toggle-icon">&#9789;</span>
</button>
<button class="lang-toggle" id="langToggle" title="Switch language" aria-label="Switch language between English and Chinese">
  <span class="lang-option active" data-lang="en">EN</span>
  <span class="lang-divider">/</span>
  <span class="lang-option" data-lang="zh">&#20013;</span>
</button>

<!-- SUBSCRIBE BUTTON (top-right) -->
<button class="subscribe-btn-top" id="subscribeBtn" title="Subscribe">
  <span class="subscribe-icon"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em;"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg></span>
  <span class="subscribe-text" id="subscribeBtnText">Subscribe</span>
</button>

<div class="chronicle-app">
  <header class="site-header">
    <div class="header-ornament">
      <span class="line"></span>
      <span class="diamond"></span>
      <span class="line"></span>
    </div>
    <h1 class="site-title" id="siteTitle"></h1>
    <p class="site-subtitle" id="siteSubtitle"></p>
  </header>

  <div class="chronicle-body">
    <nav class="tab-navigation" id="tabNav"></nav>
    <main class="main-panel">
      <div class="panel-content" id="panelContent"></div>
    </main>
  </div>

  <footer class="site-footer">
    <div class="footer-ornament">
      <span class="line"></span>
      <span class="diamond"></span>
      <span class="line"></span>
    </div>
    <span id="footerText"></span>
  </footer>
</div>

<!-- Post detail modal -->
<div class="modal-overlay" id="postModal" role="dialog" aria-modal="true">
  <div class="modal-content">
    <button class="modal-close" id="modalClose">&#10005;</button>
    <h2 class="modal-title" id="modalTitle"></h2>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-nav" id="modalNav"></div>
    <div class="modal-tags" id="modalTags"></div>
  </div>
</div>

<!-- Subscribe modal -->
<div class="modal-overlay" id="subModal" role="dialog" aria-modal="true">
  <div class="modal-content sub-modal-box">
    <button class="modal-close" id="subModalClose">&#10005;</button>
    <h2 class="modal-title" id="subModalTitle">Subscribe</h2>
    <p class="sub-modal-desc" id="subModalDesc"></p>
    <div class="sub-form" id="subForm">
      <input type="email" class="sub-input" id="subEmail" placeholder="your@email.com" autocomplete="email">
      <button class="sub-submit" id="subSubmit"></button>
    </div>
    <div class="sub-msg" id="subMsg"></div>
    <div class="sub-vpn-hint" id="subVpnHint"></div>
    <div class="sub-toggle-mode">
      <button class="sub-mode-link" id="subToggleMode"></button>
    </div>
  </div>
</div>

<!-- Back to top -->
<button class="back-to-top" id="backToTop" aria-label="Back to top">&#8593;</button>

<script src="https://cdn.bootcdn.net/ajax/libs/marked/15.0.4/marked.min.js" integrity="sha384-2NndlFAl0twi2nmu3w9mixodZFiN2fbxlakcYJF86bn1JeS1VB87/XqA7cqymzS+" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="style/chronicle.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"75124c326cb447fe934cde04713ae013","r":1,"server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/sw.js').catch(function () {});
    });
  }
</script>
</body>
</html>
